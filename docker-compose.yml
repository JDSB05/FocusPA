
services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    restart: always

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: always

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: focuspa
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: focus_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # --- OLLAMA: 3 perfis ---
  ollama-cpu:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["cpu"]
    environment:
      - OLLAMA_FORCE_CPU=true
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  ollama-nvidia:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["nvidia"]
    environment:
      - OLLAMA_FORCE_CPU=false
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  ollama-amd:
    # AMD/ROCm precisa desta imagem
    image: ollama/ollama:rocm
    container_name: ollama
    profiles: ["amd"]
    environment:
      - OLLAMA_FORCE_CPU=false
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "video"
    ipc: host
    restart: always

volumes:
  esdata:
  pgdata:
  ollama_data:
  chroma_data: