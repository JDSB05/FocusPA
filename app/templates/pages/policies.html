{% extends 'layout.html' %}
{% block title %}Políticas{% endblock %}
{% block content %}
<h1>Políticas</h1>
<p><a href="{{ url_for('main.policy_new') }}">Nova Política</a></p>
<ul>
  {% for policy in policies %}
  <li>
    <strong>{{ policy.name }}</strong>
    [<a href="{{ url_for('policy_edit', policy_id=policy.id) }}">editar</a>]
    <form method="post" action="{{ url_for('main.policy_delete', policy_id=policy.id) }}" style="display:inline;">
      <button type="submit">apagar</button>
    </form>
  </li>
  {% else %}
  <li>Nenhuma política definida.</li>
  {% endfor %}
</ul>
{% endblock %}
