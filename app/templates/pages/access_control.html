{% extends 'layout.html' %}
{% block title %}Controlo de Acesso{% endblock %}
{% block content %}
<div class="container">
  <h1>Controlo de Acesso</h1>
  <p>Gestão de permissões e acessos.</p>
  <table class="table">
    <thead>
      <tr><th>Usuário</th><th>Email</th><th>Ativo</th><th>Selecionar</th></tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.username }}</td>
        <td>{{ u.email }}</td>
        <td>{{ 'Sim' if u.is_active else 'Não' }}</td>
        <td><input type="checkbox" name="selected_users" value="{{ u.id }}"></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <button class="btn btn-primary" id="applyChanges">Aplicar Alterações</button>
</div>
<script>
document.getElementById('applyChanges').addEventListener('click', function() {
  var selected = Array.from(document.querySelectorAll('input[name="selected_users"]:checked'))
                      .map(cb => cb.value);
  fetch('/access_control/update', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({users: selected})
  }).then(() => location.reload());
});
</script>
{% endblock %}
