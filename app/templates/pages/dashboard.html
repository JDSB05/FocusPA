{% extends 'layout.html' %}

{% block title %}Dashboard de Anomalias{% endblock %}

{% block content %}
<div class="container">
  <h1 class="mb-4">Dashboard</h1>
  <div class="row">
    <!-- Anomaly count card -->
    <div class="col-md-4">
      <div class="card text-white bg-danger mb-3">
        <div class="card-header">Total Anomalias:</div>
        <div class="card-body">
          <h2 class="card-title">{{ total_anomalies }}</h2>
        </div>
      </div>
    </div>
    <!-- Compliance percentage card -->
    <div class="col-md-4">
      <div class="card text-white bg-success mb-3">
        <div class="card-header">Conformidade:</div>
        <div class="card-body">
          <h2 class="card-title">{{ compliance_rate }}%</h2>
        </div>
      </div>
    </div>
  </div>
  <!-- Interactive chart -->
  <div class="row">
    <div class="col-12">
      <canvas id="anomalyChart" width="400" height="200"></canvas>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
  <script>
    total_anomalies = {{ total_anomalies }};
    {% if compliance_rate is not none %}
      compliance_rate = {{ compliance_rate }};
    {% else %}
      compliance_rate = 0; // Default value if not provided
    {% endif %}
    console.log('Total Anomalies:', total_anomalies, 'Compliance Rate:', compliance_rate);
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const labels = {{ chart_labels|tojson }} || [];
      const data   = {{ chart_data|tojson }} || [];
      console.log('Labels:', labels, 'Data:', data);

      const ctx = document.getElementById('anomalyChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Anomalias por dia',
            data: data,
            fill: false,
            tension: 0.1
          }]
        }
      });
    });
  </script>
{% endblock %}
