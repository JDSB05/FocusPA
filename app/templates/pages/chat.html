{% extends 'layout.html' %}
{% block title %}Chat com LLM (RAG){% endblock %}
{% block content %}
<div class="chat-container">
  <div class="view new-chat-view"></div>

  <div class="view conversation-view">
    <div id="chat-box">
      <div id="chat-placeholder" class="chat-placeholder">
        Escreve uma pergunta para começar. O bot irá responder com base nas informações disponíveis nos logs e
        políticas.
      </div>
    </div>
  </div>
  <div id="message-form">
    <form id="form" class="message-wrapper">
      <input id="message" type="text" placeholder="Escreve a tua pergunta..." required>
      <button class="send-button" type="submit" id="send-btn">
        <i class="fa fa-paper-plane"></i>
      </button>
    </form>
  </div>
</div>

<!-- Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Sanitização contra XSS -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
<!-- (Opcional) highlight.js para blocos de código -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/default.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

<script>
  const form     = document.getElementById('form');
  const input    = document.getElementById('message');
  const chatBox  = document.getElementById('chat-box');
  const sendBtn  = document.getElementById('send-btn');

  let controller   = null;
  let isStreaming  = false;
  const history    = []; // [{role:'user'|'assistant'|'system', content:'...'}]

  function addMessage(text, sender) {
    const placeholder = document.getElementById('chat-placeholder');
    if (placeholder && placeholder.style.display !== 'none') placeholder.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = sender + ' message';

    const identityHtml = `
      <div class="identity">
        <i class="${sender === 'user' ? 'user-icon' : 'gpt user-icon'}">
          ${sender === 'user' ? '{{ current_user.username[0]|upper }}' : 'IA'}
        </i>
      </div>`;

    const content = document.createElement('div');
    content.className = 'content';

    if (sender === 'assistant') {
      const pre = document.createElement('pre');
      pre.className = 'streaming';
      pre.style.whiteSpace = 'pre-wrap';
      pre.style.margin = 0;
      pre.textContent = text || '';
      content.appendChild(pre);
    } else {
      // user msg -> sanitiza e permite quebras de linha
      const safeUser = DOMPurify.sanitize(text).replace(/\n/g, '<br>');
      content.innerHTML = safeUser;
    }

    msg.innerHTML = identityHtml;
    msg.appendChild(content);
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
    return msg;
  }

  function updateSendButton() {
    if (isStreaming) {
      sendBtn.innerHTML = '<i class="fa fa-stop"></i>';
      sendBtn.classList.add('cancel-mode');
      sendBtn.type = 'button';
    } else {
      sendBtn.innerHTML = '<i class="fa fa-paper-plane"></i>';
      sendBtn.classList.remove('cancel-mode');
      sendBtn.type = 'submit';
    }
  }

  function cancelAnswer() {
    if (controller) {
      controller.abort();
      controller = null;
      console.log('[INFO] Pedido cancelado pelo utilizador.');
    }
    isStreaming = false;
    updateSendButton();
  }

  async function streamAnswer(question, targetMsgEl) {
    controller = new AbortController();
    const signal = controller.signal;
    isStreaming = true;
    updateSendButton();

    const payload = {
      question,
      messages: history  // envia histórico do browser
    };

    const response = await fetch('/rag', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal
    });

    if (!response.ok) {
      let errText = '[Erro ao contactar o servidor]';
      try {
        const data = await response.json();
        errText = data?.error ? `[${data.error}]` : errText;
      } catch (e) {
        if (response.status === 401) errText = '[Não autenticado. Por favor inicia sessão.]';
      }
      const content = targetMsgEl.querySelector('.content');
      content.textContent = errText;
      isStreaming = false;
      updateSendButton();
      return;
    }

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let accum     = '';
    const pre     = targetMsgEl.querySelector('pre.streaming');

    try {
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        accum += chunk;
        if (pre) {
          pre.textContent = accum;
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }
    } catch (err) {
      console.log('[INFO] Stream cancelada/interrompida:', err);
    }

    // Render final (Markdown -> HTML)
    const rendered = marked.parse(accum || '');
    const safeHtml = DOMPurify.sanitize(rendered);
    const content  = targetMsgEl.querySelector('.content');
    content.innerHTML = safeHtml;
    if (window.hljs) hljs.highlightAll();
    chatBox.scrollTop = chatBox.scrollHeight;

    // guarda a resposta completa no histórico
    history.push({ role: 'assistant', content: accum });

    isStreaming = false;
    updateSendButton();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    if (isStreaming) {
      cancelAnswer();
      return;
    }

    const question = input.value.trim();
    if (!question) return;

    // UI + histórico (user)
    addMessage(question, 'user');
    history.push({ role: 'user', content: question });

    // placeholder assistant
    const assistantMsg = addMessage('', 'assistant');

    input.value = '';
    await streamAnswer(question, assistantMsg);
  });
</script>

<style>
  .chat-container {
    justify-content: space-between;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  p { margin: 0 0 1em 0; padding-top: 5px; }
  .send-button.cancel-mode {
    background-color: #f44336;
    color: white;
  }
  .send-button.cancel-mode:hover {
    background-color: #d32f2f;
  }
  .send-button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
{% endblock %}
