{% extends 'layout.html' %}
{% block title %}Chat com LLM (RAG){% endblock %}
{% block content %}
<div class="view new-chat-view"></div>

<div class="view conversation-view">
    <div id="chat-box">
        <div id="chat-placeholder" class="chat-placeholder">
            Escreve uma pergunta para começar. O bot irá responder com base nas informações disponíveis nos logs e políticas.
        </div>
    </div>
</div>

<div id="message-form">
    <form id="form" class="message-wrapper">
        <input id="message" type="text" placeholder="Escreve a tua pergunta..." required>
        <button class="send-button" type="submit"><i class="fa fa-paper-plane"></i></button>
    </form>
</div>


<script>
    const form = document.getElementById('form');
    const input = document.getElementById('message');
    const chatBox = document.getElementById('chat-box');

    function addMessage(text, sender) {
        const placeholder = document.getElementById('chat-placeholder');
        if (placeholder.style.display !== 'none') 
            placeholder.style.display = 'none';
        const msg = document.createElement('div');
        console.log('Adding message:', text, 'from sender:', sender);
        msg.className = sender + ' message';
        msg.innerHTML = `
            <div class="identity">
                <i class="${sender === 'user' ? 'user-icon' : 'gpt user-icon'}">${sender === 'user' ? 'u' : 'G'}</i>
            </div>
            <div class="content">
                <p class="message-text">${text}</p>
            </div>
        `;
        console.log('Message element created:', msg);
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, 'user');
        input.value = '';

        try {
            const response = await fetch('/rag', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });

            const data = await response.json();
            addMessage(data.answer || '[Erro na resposta]', 'assistant');
        } catch (error) {
            console.error('Erro:', error);
            addMessage('[Erro ao contactar o servidor]', 'assistant');
        }
    });
</script>
{% endblock %}
