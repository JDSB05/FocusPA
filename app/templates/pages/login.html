{% extends 'layout.html' %}
{% block title %}Entrar{% endblock %}
{% block content %}
<h1>Login</h1>
<form method="post">
  <label>Utilizador:<input type="text" name="username"></label><br>
  <label>Senha:<input type="password" name="password"></label><br>
  <button type="submit">Entrar</button>
</form>
<p>Ainda não tem conta? <a href="{{ url_for('auth.register') }}">Registe-se</a></p>
{% endblock %}
