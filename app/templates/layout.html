<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  </head>
  <body>
    <nav>
      <a href="/">Início</a>
      <a href="/anomalies/">Anomalias</a>
      <a href="/policies/">Políticas</a>
      <a href="/access-control">Controlo de Acesso</a>
      <a href="/forensic">Forense</a>
      <a href="/compliance">Conformidade</a>
      <a href="/chat">Chat</a>
      <a href="/logout">Sair</a>
    </nav>

    <main>
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const flashList = document.getElementById('flash-list');
        if (flashList) {
          flashList.querySelectorAll('li').forEach(li => {
            const category = li.dataset.category;
            const message  = li.textContent.trim();
            let bg;
            switch (category) {
              case 'Erro':     bg = "#e74c3c"; break;
              case 'Sucesso':  bg = "#2ecc71"; break;
              case 'Aviso':    bg = "#f39c12"; break;
              default:         bg = "#3498db";
            }
            Toastify({ text: message,
                       duration: 5000,
                       gravity: "top",
                       position: "right",
                       style: { fontSize:"25px", padding:"20px 30px", fontFamily:"Tahoma" },
                       backgroundColor: bg,
                       stopOnFocus: true
            }).showToast();
          });
        }
      });
    </script>

    {% block scripts %}{% endblock %}
  </body>
</html>
