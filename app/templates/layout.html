<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>{% block title %}Dashboard{% endblock %}</title>

  <!-- CSS base -->
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Toastify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>
  <!-- Sidebar unificado -->
  <nav id="sidebar">
    <div class="float-top">
      <div class="sidebar-controls">
        <span class="logo">POLICYSENSE</span>
        <button class="hide-sidebar" id="hide-sidebar">
          <i class="fa fa-chevron-left"></i>
        </button>

      </div>
  
      <!-- Navbar principal dentro do sidebar -->
      <div>
        <ul class="conversations">
          <li>
            <button class="conversation-button" onclick="location.href='/'"><i class="fa-solid fa-chart-line"></i>
              Dashboard</button>
          </li>
          <li>
            <button class="conversation-button" onclick="location.href='/anomalies/'"><i
                class="fa-solid fa-exclamation-triangle"></i> Anomalias</button>
          </li>
          <li>
            <button class="conversation-button" onclick="location.href='/policies/'"><i
                class="fa-solid fa-file-contract"></i> Políticas</button>
          </li>
          <li>
            <button class="conversation-button" onclick="location.href='/access-control'"><i
                class="fa-solid fa-user-lock"></i> Controlo de Acesso</button>
          </li>
          <li>
            <button class="conversation-button" onclick="location.href='/forensic'"><i
                class="fa-solid fa-magnifying-glass"></i> Forense</button>
          </li>
          <li>
            <button class="conversation-button" onclick="location.href='/compliance'"><i
                class="fa-solid fa-check-circle"></i> Conformidade</button>
          </li>
          <li>
            <button class="conversation-button" onclick="location.href='/chat'"><i class="fa-solid fa-comments"></i>
              Chat</button>
          </li>
        </ul>
      </div>
    </div>

    <div class="user-menu">
      <button>
        <i class="user-icon">
          {%- if current_user.is_authenticated -%}
          {{ current_user.username[0]|upper }}
          {%- else -%}
          U
          {%- endif -%}
        </i>
        {%- if current_user.is_authenticated -%}
        {{ current_user.username }}
        {%- else -%}
        Convidado
        {%- endif -%}
        <i class="fa fa-ellipsis dots"></i>
      </button>
      <ul>
        <li><button>Instruções personalizadas</button></li>
        <li><button>Definições</button></li>
        <li><button onclick="location.href='/logout'">Sair</button></li>
      </ul>
    </div>
  </nav>

  <!-- Conteúdo principal -->
  <main id="main">
    {% block content %}
    {% endblock %}
  </main>

  <!-- Toastify Flash messages -->
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const flashList = document.getElementById('flash-list');
      if (flashList) {
        flashList.querySelectorAll('li').forEach(li => {
          const category = li.dataset.category;
          const message = li.textContent.trim();
          let bg;
          switch (category) {
            case 'Erro':     bg = "#e74c3c"; break;
            case 'Sucesso':  bg = "#2ecc71"; break;
            case 'Aviso':    bg = "#f39c12"; break;
            default:         bg = "#3498db";
          }
          Toastify({
            text: message,
            duration: 5000,
            gravity: "top",
            position: "right",
            style: {
              fontSize: "25px",
              padding: "20px 30px",
              fontFamily: "Tahoma"
            },
            backgroundColor: bg,
            stopOnFocus: true
          }).showToast();
        });
      }
    });
  </script>
  <script src="/static/js/script.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function () {
      var user = document.querySelector('input[name="username"]').value;
      localStorage.setItem('username', user);
    });
  </script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const storedUser = localStorage.getItem('username');
    if (storedUser) {
      const icon = document.querySelector('.user-icon');
      const btn  = icon.closest('button');
      // Atualiza a letra no ícone
      icon.textContent = storedUser.charAt(0).toUpperCase();
      // Atualiza o texto junto ao ícone
      btn.childNodes[2].nodeValue = ' ' + storedUser;
    }
  });
</script>
  {% block scripts %}
  {% endblock %}
</body>
</html>
